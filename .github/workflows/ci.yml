name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-check:
    name: Frontend lint & types
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check

  frontend-unit:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:unit

  bindings-drift:
    name: IPC bindings drift
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: npm run gen:types
      - run: git diff --exit-code src/ipc/bindings.ts

  rust-check:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Clippy
        run: cargo clippy -- -D warnings
        working-directory: src-tauri
      - name: Unit & regression tests
        run: cargo test
        working-directory: src-tauri

  build-e2e:
    name: Build & E2E (Windows)
    runs-on: windows-latest
    timeout-minutes: 60
    needs:
      - frontend-check
      - frontend-unit
      - rust-check
      - bindings-drift
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: npm ci
      - run: npm run test:unit:coverage
      - uses: codecov/codecov-action@v4
        continue-on-error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false
      - run: cargo test --release bench_ -- --ignored --nocapture
        working-directory: src-tauri
      - run: cargo llvm-cov --lcov --output-path lcov-rust.info
        working-directory: src-tauri
      - uses: codecov/codecov-action@v4
        continue-on-error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: src-tauri/lcov-rust.info
          flags: rust
          fail_ci_if_error: false
      - run: npm run build
      - run: npm run check:bundle-size
      - run: npx playwright install chromium
      - run: npm run test:e2e
      - run: npm run test:e2e:integration

  native-e2e:
    name: Native WebDriver E2E
    if: ${{ vars.TAURI_WEBDRIVER_URL != '' }}
    runs-on: windows-latest
    timeout-minutes: 30
    needs:
      - build-e2e
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium
      - name: Native WebDriver E2E
        env:
          TAURI_WEBDRIVER_URL: ${{ vars.TAURI_WEBDRIVER_URL || secrets.TAURI_WEBDRIVER_URL }}
        run: npm run test:e2e:native

  ci-summary:
    name: CI summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - frontend-check
      - frontend-unit
      - bindings-drift
      - rust-check
      - build-e2e
      - native-e2e
    steps:
      - name: Aggregate job results
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          node <<'NODE'
          const needs = JSON.parse(process.env.NEEDS_JSON || '{}');
          const required = [
            'frontend-check',
            'frontend-unit',
            'bindings-drift',
            'rust-check',
            'build-e2e',
          ];
          const rows = Object.entries(needs).map(([name, job]) => ({
            name,
            result: job.result ?? 'skipped',
          }));
          const failed = required.filter((name) => needs[name]?.result === 'failure');
          const cancelled = required.filter((name) => needs[name]?.result === 'cancelled');
          console.log('CI job results:');
          for (const row of rows) {
            console.log(`  ${row.result.padEnd(9)} ${row.name}`);
          }
          if (failed.length || cancelled.length) {
            console.error(`\n${failed.length} failed, ${cancelled.length} cancelled`);
            process.exit(1);
          }
          console.log('\nAll required jobs passed.');
          NODE
