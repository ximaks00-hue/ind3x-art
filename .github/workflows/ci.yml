name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cross-platform:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Rust lint (clippy)
        run: cargo clippy -- -D warnings
        working-directory: src-tauri

      - name: Rust tests
        run: cargo test
        working-directory: src-tauri

  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Generate Rust→TS types (verify no drift)
        run: npm run gen:types

      - name: Verify generated types match committed export
        run: git diff --exit-code src/ipc/bindings.ts

      - name: ESLint
        run: npm run lint

      - name: Unit tests with coverage (Vitest)
        run: npm run test:unit:coverage

      - name: Upload frontend coverage (Codecov)
        uses: codecov/codecov-action@v4
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

      - name: Prettier check
        run: npm run format:check

      - name: Rust lint (clippy)
        run: cargo clippy -- -D warnings
        working-directory: src-tauri

      - name: Rust tests
        run: cargo test
        working-directory: src-tauri

      - name: Rust performance benchmarks
        run: cargo test --release bench_ -- --ignored --nocapture
        working-directory: src-tauri

      - name: Rust coverage (llvm-cov)
        run: cargo llvm-cov --lcov --output-path lcov-rust.info
        working-directory: src-tauri

      - name: Upload Rust coverage (Codecov)
        uses: codecov/codecov-action@v4
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: src-tauri/lcov-rust.info
          flags: rust
          fail_ci_if_error: false

      - name: Frontend build
        run: npm run build

      - name: Bundle size budget (main chunk gzip)
        run: npm run check:bundle-size

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: E2E tests (smoke + visual)
        run: npm run test:e2e

      - name: E2E integration (fixture + mock IPC)
        run: npm run test:e2e:integration

  native-e2e:
    if: ${{ vars.TAURI_WEBDRIVER_URL != '' }}
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Native WebDriver E2E
        env:
          TAURI_WEBDRIVER_URL: ${{ vars.TAURI_WEBDRIVER_URL || secrets.TAURI_WEBDRIVER_URL }}
        run: npm run test:e2e:native
